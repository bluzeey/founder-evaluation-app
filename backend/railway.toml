"$schema" = "https://railway.app/railway.schema.json"

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "alembic upgrade head && gunicorn main:app --bind 0.0.0.0:${PORT:-8000} --workers 2 --timeout 120 --access-logfile - --error-logfile - --log-level info -k uvicorn.workers.UvicornWorker"
healthcheckPath = "/health"
healthcheckTimeout = 120
healthcheckInterval = 15
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
