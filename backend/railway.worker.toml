"$schema" = "https://railway.app/railway.schema.json"

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd backend && celery -A celery_app worker -l info --concurrency=1 --prefetch-multiplier=1 --max-tasks-per-child=10 --max-memory-per-child=300000"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
